version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: scl_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scl_db
      MYSQL_USER: scl_user
      MYSQL_PASSWORD: scl_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: